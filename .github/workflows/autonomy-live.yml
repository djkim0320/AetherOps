name: Autonomy live verification

permissions:
  contents: read

concurrency:
  group: autonomy-live-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "30 16 * * *"
  workflow_dispatch:
    inputs:
      profile:
        description: "Bounded live autonomy profile"
        required: true
        type: choice
        default: smoke
        options:
          - smoke
          - nightly
          - release

jobs:
  live-autonomy:
    name: ${{ github.event_name == 'schedule' && 'nightly' || inputs.profile }} gpt-5.6-sol/high
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci

      - name: Run exact-runtime autonomy evaluation
        shell: pwsh
        run: |
          $profile = if ("${{ github.event_name }}" -eq "schedule") { "nightly" } else { "${{ inputs.profile }}" }
          npm run autonomy:verify -- --profile $profile

      - name: Upload sanitized autonomy evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: autonomy-${{ github.run_id }}
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 14
          path: .tmp/autonomy-verify/**

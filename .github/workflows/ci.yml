name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_live:
        description: "Run the manual live self-test job"
        required: false
        type: boolean
        default: false
      strict_live:
        description: "Fail live self-test when live credentials are missing"
        required: false
        type: boolean
        default: false

jobs:
  offline:
    name: Offline PR gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for UI verification
        run: npx playwright install --with-deps --only-shell chromium

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Architecture check
        run: npm run architecture:check

      - name: Size check
        run: npm run size:check

      - name: Stylelint
        run: npm run stylelint

      - name: CSS tokens
        run: npm run css:tokens

      - name: Typecheck
        run: npm run typecheck

      - name: Offline unit and integration tests
        run: npm test

      - name: Offline autonomy verification
        run: npm run autonomy:verify -- --profile offline

      - name: Migration read-only check
        run: |
          mkdir -p .tmp/ci-migration
          npm run migrate:check -- --data-root .tmp/ci-migration --json

      - name: Build
        run: npm run build

      - name: Real server UI and blocked-path E2E
        run: npm run selftest:blocked

      - name: Upload self-test evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: aetherops-selftest-evidence
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7
          path: |
            .tmp/aetherops-selftest/blocked-path-result.json
            .tmp/aetherops-selftest/self-test-report.md
            .tmp/autonomy-verify/**/autonomy-report.json
            .tmp/autonomy-verify/**/autonomy-report.md
            .tmp/autonomy-verify/**/manifest.json

  windows-launcher-smoke:
    name: Windows launcher smoke
    runs-on: windows-latest
    needs: offline

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run launcher and verify health
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $process = Start-Process -FilePath "cmd.exe" -ArgumentList "/c run-aetherops.bat --silent --no-browser" -WorkingDirectory $PWD.Path -PassThru -WindowStyle Hidden
          $lastError = $null
          $healthy = $false

          try {
            $deadline = (Get-Date).AddSeconds(120)
            while ((Get-Date) -lt $deadline) {
              if ($process.HasExited) {
                throw "Launcher exited before /api/health became healthy. Exit code: $($process.ExitCode)"
              }

              try {
                $health = Invoke-RestMethod -Uri "http://127.0.0.1:5179/api/health" -TimeoutSec 5
                if ($health.ok -eq $true) {
                  Write-Host "AetherOps health check passed on port $($health.port)."
                  $healthy = $true
                  break
                }
              } catch {
                $lastError = $_.Exception.Message
              }

              Start-Sleep -Seconds 2
            }

            if (-not $healthy) {
              throw "Timed out waiting for /api/health. Last error: $lastError"
            }
          } finally {
            if (-not $process.HasExited) {
              taskkill /PID $process.Id /T /F
            }

            if (Test-Path ".aetherops\launcher.log") {
              Get-Content ".aetherops\launcher.log" -Tail 100
            }
          }

  live:
    name: Live network self-test
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for UI verification
        run: npx playwright install --with-deps --only-shell chromium

      - name: Live self-test
        shell: bash
        run: |
          args=(--full-static)
          if [[ "${{ inputs.strict_live }}" == "true" ]]; then
            args+=(--strict-live)
          fi
          npm run selftest:live -- "${args[@]}"

      - name: Upload live self-test evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: aetherops-live-selftest-evidence
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7
          path: |
            .tmp/aetherops-selftest/self-test-report.md
